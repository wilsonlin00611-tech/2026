<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿笠博士的偵探工具箱 🔍</title>
    <style>
        /* ================= 變數與基礎設定 ================= */
        :root {
            --bg-color: #f0f8ff; /* 淺藍底色 */
            --light-blue: #1723b8; /* 淡藍色 */
            --powder-blue: #ffffff; /*  */
            --pink-hover: #165ae5; /* 粉紅色 hover */
            --white: #ffffff;
            --text-dark: #2c3e50;
            --text-light: #546e7a;
            --shadow: 0 8px 24px rgba(173, 216, 230, 0.4);
            --radius: 24px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: '微軟正黑體', 'PingFang TC', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            /* 淡淡的點點背景 */
            background-image: radial-gradient(var(--powder-blue) 15%, transparent 16%), radial-gradient(var(--powder-blue) 15%, transparent 16%);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* ================= 版面佈局 ================= */
        .container {
            display: flex;
            flex-direction: row;
            width: 100%;
            max-width: 1000px;
            height: 85vh;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            border: 2px solid var(--white);
        }

        /* 左側選單 */
        .sidebar {
            width: 250px;
            background-color: var(--white);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 4px 0 15px rgba(173, 216, 230, 0.2);
            z-index: 10;
        }

        .sidebar-title {
            color: var(--light-blue);
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }

        .nav-btn {
            background-color: transparent;
            border: 2px solid transparent;
            color: var(--text-dark);
            padding: 12px 20px;
            border-radius: 16px;
            font-size: 1.1rem;
            cursor: pointer;
            text-align: left;
            transition: all 0.3s ease;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-btn:hover {
            background-color: #fff0f5;
            color: var(--pink-hover);
            transform: translateX(5px);
        }

        .nav-btn.active {
            background-color: var(--light-blue);
            color: var(--white);
            border-color: var(--powder-blue);
            box-shadow: 0 4px 10px rgba(173, 216, 230, 0.5);
        }

        /* 主內容區 */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            position: relative;
        }

        .tool-section {
            display: none;
            animation: fadeIn 0.4s ease-out;
            height: 100%;
        }

        .tool-section.active {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ================= 共用 UI 元件 ================= */
        .card {
            background-color: var(--white);
            border-radius: var(--radius);
            padding: 30px;
            width: 100%;
            max-width: 600px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .section-title {
            color: var(--light-blue);
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .display-screen {
            font-size: 4rem;
            font-weight: bold;
            color: var(--text-dark);
            background: #f8fbff;
            border: 3px solid var(--powder-blue);
            border-radius: 16px;
            padding: 20px;
            margin: 20px 0;
            letter-spacing: 2px;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.05);
        }

        .btn {
            background-color: var(--powder-blue);
            color: var(--text-dark);
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            margin: 5px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .btn:hover {
            background-color: var(--pink-hover);
            color: var(--white);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-group {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }

        /* ================= 各別工具特製樣式 ================= */
        /* 首頁 */
        #home p {
            font-size: 1.2rem;
            color: var(--text-light);
            line-height: 1.6;
        }

        /* 番茄鐘 */
        .pomo-mode.active {
            background-color: var(--light-blue);
            color: var(--white);
        }
        .custom-time {
            margin: 15px 0;
        }
        .custom-time input {
            width: 80px;
            padding: 8px;
            border: 2px solid var(--powder-blue);
            border-radius: 10px;
            text-align: center;
            font-size: 1.1rem;
            outline: none;
        }
        .custom-time input:focus {
            border-color: var(--pink-hover);
        }

        /* 計數器 (機械風格) */
        .mech-btn {
            background: linear-gradient(145deg, #ffffff, #e6e6e6);
            border: 2px solid #ccc;
            box-shadow: 5px 5px 10px #d9d9d9, -5px -5px 10px #ffffff;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            font-size: 2rem;
            color: var(--light-blue);
        }
        .mech-btn:hover {
            background: var(--pink-hover);
            color: white;
            border-color: var(--pink-hover);
        }
        .mech-btn:active {
            box-shadow: inset 5px 5px 10px #d9d9d9, inset -5px -5px 10px #ffffff;
        }

        /* 世界時鐘 */
        .clock-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
            align-items: center;
        }
        select {
            padding: 10px;
            border-radius: 12px;
            border: 2px solid var(--powder-blue);
            font-size: 1rem;
            outline: none;
            background: white;
        }
        .clock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            width: 100%;
        }
        .clock-card {
            background: var(--white);
            border: 2px solid var(--powder-blue);
            border-radius: 16px;
            padding: 15px;
            position: relative;
            text-align: center;
            transition: transform 0.2s;
        }
        .clock-card:hover {
            transform: translateY(-5px);
            border-color: var(--pink-hover);
            box-shadow: 0 5px 15px rgba(255, 182, 193, 0.4);
        }
        .remove-clock {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #ffcccb;
            color: white;
            border: none;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            cursor: pointer;
            font-weight: bold;
            line-height: 1;
        }
        .remove-clock:hover { background: red; }
        .clock-city { font-weight: bold; color: var(--light-blue); font-size: 1.2rem;}
        .clock-date { font-size: 0.9rem; color: var(--text-light); margin: 5px 0;}
        .clock-time { font-size: 1.8rem; font-weight: bold; color: var(--text-dark);}

        /* ================= RWD 響應式設計 ================= */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                height: 95vh;
            }
            .sidebar {
                width: 100%;
                padding: 15px;
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                border-bottom: 2px solid var(--powder-blue);
            }
            .sidebar-title {
                width: 100%;
                margin-bottom: 10px;
            }
            .nav-btn {
                padding: 8px 12px;
                font-size: 0.9rem;
            }
            .main-content {
                padding: 20px;
            }
            .display-screen {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <aside class="sidebar">
        <div class="sidebar-title">🕵️ 阿笠博士工具箱</div>
        <button class="nav-btn active" data-target="home">🏠 首頁</button>
        <button class="nav-btn" data-target="pomodoro">🍅 偵探番茄鐘</button>
        <button class="nav-btn" data-target="announcer">🗣️ 語音報時</button>
        <button class="nav-btn" data-target="stopwatch">⏱️ 精準碼錶</button>
        <button class="nav-btn" data-target="counter">⚙️ 機械計數器</button>
        <button class="nav-btn" data-target="worldclock">🌍 世界時鐘</button>
    </aside>

    <main class="main-content">
        <section id="home" class="tool-section active">
            <div class="card">
                <h2 class="section-title">歡迎來到阿笠博士工具箱！ 👓</h2>
                <div style="font-size: 5rem; margin: 20px 0;">🛹</div>
                <p>你好呀！這裡準備了各種好用的調查工具。<br>請從左側（或上方）的選單選擇需要的工具開始吧！<br>點擊按鈕，開始今天的推理！</p>
            </div>
        </section>

        <section id="pomodoro" class="tool-section">
            <div class="card">
                <h2 class="section-title">🍅 偵探番茄鐘</h2>
                <div class="btn-group">
                    <button class="btn pomo-mode active" onclick="setPomoMode(25, this)">工作 (25分)</button>
                    <button class="btn pomo-mode" onclick="setPomoMode(5, this)">短休 (5分)</button>
                    <button class="btn pomo-mode" onclick="setPomoMode(10, this)">長休 (10分)</button>
                </div>
                <div class="custom-time">
                    自訂：<input type="number" id="customPomoMin" min="1" max="99" value="25" onchange="setCustomPomo()"> 分鐘
                </div>
                <div class="display-screen" id="pomoDisplay">25:00</div>
                <div class="btn-group">
                    <button class="btn" id="pomoStartBtn" onclick="togglePomo()">開始</button>
                    <button class="btn" onclick="resetPomo()">重置</button>
                </div>
            </div>
        </section>

        <section id="announcer" class="tool-section">
            <div class="card">
                <h2 class="section-title">🗣️ 語音報時</h2>
                <div class="display-screen" id="currentClockDisplay">00:00:00</div>
                <button class="btn" style="font-size: 1.5rem; padding: 15px 30px;" onclick="announceTime()">🔊 播報現在時間</button>
                <p style="margin-top: 20px; color: var(--text-light);">※ 需允許瀏覽器播放音效</p>
            </div>
        </section>

        <section id="stopwatch" class="tool-section">
            <div class="card">
                <h2 class="section-title">⏱️ 精準碼錶</h2>
                <div class="display-screen" id="swDisplay">00:00.00</div>
                <div class="btn-group">
                    <button class="btn" id="swStartBtn" onclick="toggleStopwatch()">開始</button>
                    <button class="btn" onclick="resetStopwatch()">重置</button>
                </div>
            </div>
        </section>

        <section id="counter" class="tool-section">
            <div class="card">
                <h2 class="section-title">⚙️ 機械計數器</h2>
                <div class="display-screen" id="counterDisplay">0</div>
                <div class="btn-group" style="gap: 20px; margin-top: 20px;">
                    <button class="btn mech-btn" onclick="updateCounter(-1)">-</button>
                    <button class="btn mech-btn" onclick="updateCounter(1)">+</button>
                </div>
                <button class="btn" style="margin-top: 20px;" onclick="resetCounter()">歸零</button>
            </div>
        </section>

        <section id="worldclock" class="tool-section">
            <div class="card" style="max-width: 800px;">
                <h2 class="section-title">🌍 世界時鐘</h2>
                <div class="clock-controls">
                    <select id="timezoneSelect">
                        </select>
                    <button class="btn" onclick="addClock()">➕ 加入</button>
                </div>
                <div class="clock-grid" id="clockGrid">
                    </div>
            </div>
        </section>

    </main>
</div>

<script>
    /* ================= 導覽列切換邏輯 ================= */
    const navBtns = document.querySelectorAll('.nav-btn');
    const sections = document.querySelectorAll('.tool-section');

    navBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            // 移除所有 active
            navBtns.forEach(b => b.classList.remove('active'));
            sections.forEach(s => s.classList.remove('active'));
            
            // 加入當前 active
            btn.classList.add('active');
            const target = btn.getAttribute('data-target');
            document.getElementById(target).classList.add('active');
        });
    });

    /* ================= 2. 番茄鐘邏輯 ================= */
    let pomoTimeLeft = 25 * 60;
    let pomoInterval = null;
    let isPomoRunning = false;

    function updatePomoDisplay() {
        const m = Math.floor(pomoTimeLeft / 60).toString().padStart(2, '0');
        const s = (pomoTimeLeft % 60).toString().padStart(2, '0');
        document.getElementById('pomoDisplay').textContent = `${m}:${s}`;
    }

    function setPomoMode(minutes, btnElement) {
        document.querySelectorAll('.pomo-mode').forEach(b => b.classList.remove('active'));
        if (btnElement) btnElement.classList.add('active');
        document.getElementById('customPomoMin').value = minutes;
        
        clearInterval(pomoInterval);
        isPomoRunning = false;
        document.getElementById('pomoStartBtn').textContent = '開始';
        pomoTimeLeft = minutes * 60;
        updatePomoDisplay();
    }

    function setCustomPomo() {
        let val = parseInt(document.getElementById('customPomoMin').value);
        if (isNaN(val) || val < 1) val = 1;
        setPomoMode(val, null);
    }

    function togglePomo() {
        const btn = document.getElementById('pomoStartBtn');
        if (isPomoRunning) {
            clearInterval(pomoInterval);
            btn.textContent = '繼續';
            isPomoRunning = false;
        } else {
            btn.textContent = '暫停';
            isPomoRunning = true;
            pomoInterval = setInterval(() => {
                if (pomoTimeLeft > 0) {
                    pomoTimeLeft--;
                    updatePomoDisplay();
                } else {
                    clearInterval(pomoInterval);
                    isPomoRunning = false;
                    btn.textContent = '開始';
                    alert("嗶嗶嗶！時間到囉，真理只有一個，休息時間也是！");
                }
            }, 1000);
        }
    }

    function resetPomo() {
        let val = parseInt(document.getElementById('customPomoMin').value);
        if (isNaN(val) || val < 1) val = 25;
        setPomoMode(val, document.querySelector('.pomo-mode.active') || document.querySelectorAll('.pomo-mode')[0]);
    }

    /* ================= 3. 報時功能邏輯 ================= */
    function updateCurrentClock() {
        const now = new Date();
        const h = now.getHours().toString().padStart(2, '0');
        const m = now.getMinutes().toString().padStart(2, '0');
        const s = now.getSeconds().toString().padStart(2, '0');
        document.getElementById('currentClockDisplay').textContent = `${h}:${m}:${s}`;
    }
    setInterval(updateCurrentClock, 1000);
    updateCurrentClock();

    function announceTime() {
        if ('speechSynthesis' in window) {
            const now = new Date();
            let h = now.getHours();
            let m = now.getMinutes();
            let period = h >= 12 ? '下午' : '上午';
            let speakH = h % 12 || 12; // 轉12小時制聽起來較自然
            
            const text = `現在時間，${period}${speakH}點${m}分`;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-TW';
            utterance.rate = 1;
            window.speechSynthesis.speak(utterance);
        } else {
            alert("抱歉，您的瀏覽器不支援語音功能喔！");
        }
    }

    /* ================= 4. 碼錶邏輯 ================= */
    let swStartTime = 0;
    let swElapsedTime = 0;
    let swInterval = null;
    let isSwRunning = false;

    function updateSwDisplay() {
        const time = swElapsedTime;
        const m = Math.floor(time / 60000).toString().padStart(2, '0');
        const s = Math.floor((time % 60000) / 1000).toString().padStart(2, '0');
        const c = Math.floor((time % 1000) / 10).toString().padStart(2, '0');
        document.getElementById('swDisplay').textContent = `${m}:${s}.${c}`;
    }

    function toggleStopwatch() {
        const btn = document.getElementById('swStartBtn');
        if (isSwRunning) {
            clearInterval(swInterval);
            btn.textContent = '繼續';
            isSwRunning = false;
        } else {
            swStartTime = Date.now() - swElapsedTime;
            swInterval = setInterval(() => {
                swElapsedTime = Date.now() - swStartTime;
                updateSwDisplay();
            }, 10);
            btn.textContent = '暫停';
            isSwRunning = true;
        }
    }

    function resetStopwatch() {
        clearInterval(swInterval);
        isSwRunning = false;
        swElapsedTime = 0;
        document.getElementById('swStartBtn').textContent = '開始';
        updateSwDisplay();
    }

    /* ================= 5. 計數器邏輯 ================= */
    let count = 0;
    function updateCounter(change) {
        count += change;
        document.getElementById('counterDisplay').textContent = count;
    }
    function resetCounter() {
        count = 0;
        document.getElementById('counterDisplay').textContent = count;
    }

    /* ================= 6. 世界時鐘邏輯 ================= */
    const timezones = [
        { name: '台灣', tz: 'Asia/Taipei' },
        { name: '東京', tz: 'Asia/Tokyo' },
        { name: '首爾', tz: 'Asia/Seoul' },
        { name: '曼谷', tz: 'Asia/Bangkok' },
        { name: '新加坡', tz: 'Asia/Singapore' },
        { name: '杜拜', tz: 'Asia/Dubai' },
        { name: '倫敦', tz: 'Europe/London' },
        { name: '巴黎', tz: 'Europe/Paris' },
        { name: '柏林', tz: 'Europe/Berlin' },
        { name: '紐約', tz: 'America/New_York' },
        { name: '洛杉磯', tz: 'America/Los_Angeles' },
        { name: '多倫多', tz: 'America/Toronto' },
        { name: '聖保羅', tz: 'America/Sao_Paulo' },
        { name: '雪梨', tz: 'Australia/Sydney' },
        { name: '奧克蘭', tz: 'Pacific/Auckland' }
    ];

    let activeClocks = ['Asia/Taipei', 'Asia/Tokyo', 'Europe/London', 'America/New_York'];

    // 初始化選單
    const tzSelect = document.getElementById('timezoneSelect');
    timezones.forEach(tz => {
        const opt = document.createElement('option');
        opt.value = tz.tz;
        opt.textContent = tz.name;
        tzSelect.appendChild(opt);
    });

    function renderClocks() {
        const grid = document.getElementById('clockGrid');
        grid.innerHTML = '';
        const now = new Date();

        activeClocks.forEach(tzStr => {
            const tzInfo = timezones.find(t => t.tz === tzStr) || { name: tzStr, tz: tzStr };
            
            // 取得當地時間字串
            const optionsDate = { timeZone: tzStr, month: 'short', day: 'numeric', weekday: 'short' };
            const optionsTime = { timeZone: tzStr, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            
            let dateStr = '日期讀取中';
            let timeStr = '時間讀取中';
            try {
                dateStr = now.toLocaleDateString('zh-TW', optionsDate);
                timeStr = now.toLocaleTimeString('zh-TW', optionsTime);
            } catch(e) {
                console.error("時區錯誤", e);
            }

            const card = document.createElement('div');
            card.className = 'clock-card';
            card.innerHTML = `
                <button class="remove-clock" onclick="removeClock('${tzStr}')">×</button>
                <div class="clock-city">${tzInfo.name}</div>
                <div class="clock-date">${dateStr}</div>
                <div class="clock-time">${timeStr}</div>
            `;
            grid.appendChild(card);
        });
    }

    function addClock() {
        const selected = tzSelect.value;
        if (!activeClocks.includes(selected)) {
            activeClocks.push(selected);
            renderClocks();
        } else {
            alert('這個城市已經在面板上囉！');
        }
    }

    function removeClock(tzStr) {
        activeClocks = activeClocks.filter(tz => tz !== tzStr);
        renderClocks();
    }

    // 每秒更新世界時鐘
    setInterval(renderClocks, 1000);
    renderClocks(); // 初始渲染

</script>
</body>
</html>
